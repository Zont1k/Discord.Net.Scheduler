name: CI

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tfm: [net8.0, net9.0, net10.0]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build
        run: dotnet build --configuration Release --framework ${{ matrix.tfm }}

      - name: Test
        run: dotnet test --configuration Release --framework ${{ matrix.tfm }} --no-build

  pack:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Pack
        run: dotnet pack --configuration Release -p:Version=${GITHUB_REF_NAME#v}

      - name: Push to NuGet
        run: |
          dotnet nuget push artifacts/*.nupkg `
            --api-key ${{ secrets.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json
        shell: pwsh
